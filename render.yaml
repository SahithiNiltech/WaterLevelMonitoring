services:
  - type: web
    name: water-level-monitor-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --bind 0.0.0.0:$PORT --timeout 120
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: API_KEY
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: NOTIFICATION_EMAIL
        value: sahithireddy837@gmail.com
      - key: FIRMWARE_FOLDER
        value: /tmp/firmware

  - type: static
    name: water-level-monitor-ui
    rootDir: frontend
    buildCommand: ""
    staticPublishPath: .
